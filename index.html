<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bad Decisions Studio — Creative Technology. Education. Culture.</title>
  <meta name="description" content="Bad Decisions Studio is a creative technology brand teaching millions to build with Unreal Engine, AI, and emerging tools. Podcast. Courses. Events." />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="icon" type="image/png" href="/favicon.png">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Bad Decisions Studio">
  <meta property="og:description" content="Creative technology education and content. Podcast. Courses. Events.">
  <meta property="og:image" content="/og-image.png">
  <meta property="og:url" content="https://www.baddecisions.studio">
  <meta property="og:site_name" content="Bad Decisions Studio">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Bad Decisions Studio">
  <meta name="twitter:image" content="/og-image.png">
  <meta name="theme-color" content="#080808">
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <!-- Cursor -->
  <div class="cursor-dot" id="cursor"></div>

  <!-- Home page sections -->
  <div data-include="/sections/nav.html"></div>
  <div data-include="/sections/hero.html"></div>
  <div data-include="/sections/marquee.html"></div>
  <div data-include="/sections/featured.html"></div>
  <div data-include="/sections/pillars.html"></div>
  <div data-include="/sections/footer.html"></div>

  <!-- Section loader -->
  <script>
    (function() {
      var slots = document.querySelectorAll('[data-include]');
      var total = slots.length;
      var loaded = 0;

      slots.forEach(function(slot) {
        fetch(slot.getAttribute('data-include'))
          .then(function(r) { return r.text(); })
          .then(function(html) {
            var temp = document.createElement('div');
            temp.innerHTML = html;
            while (temp.firstChild) {
              slot.parentNode.insertBefore(temp.firstChild, slot);
            }
            slot.parentNode.removeChild(slot);
            loaded++;
            if (loaded === total) {
              window.dispatchEvent(new Event('sections-loaded'));
            }
          });
      });
    })();
  </script>

  <!-- Main script (initializes after sections load) -->
  <script src="/js/main.js"></script>

</body>
</html>
