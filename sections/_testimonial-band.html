  <!-- ─── TESTIMONIAL BAND (shared) ────────────────────────────
       Drop in a single attributed quote between dense card grids on
       conversion pages (Learn, Services, Media Partnerships).

       USAGE: Replace the placeholder quote and attribution before
       including. Quote should be ~20-40 words. Attribution should
       include name + role/company.

       BACKGROUND: Defaults to .bg-dark. Override by adding .bg-light,
       .bg-green, etc. on the <section> wrapper if needed.
  ──────────────────────────────────────────────────────────── -->
  <section class="testimonial-band bg-dark">
    <div class="container">
      <div class="testimonial-band__inner reveal">
        <blockquote class="testimonial-band__quote">
          &ldquo;Replace this with a real quote from a partner, student,
          or guest. Keep it punchy &mdash; one or two sentences that say
          <em>something specific</em> about working with Bad Decisions.&rdquo;
        </blockquote>
        <div class="testimonial-band__attribution">
          <strong>Name Surname</strong>
          <span class="testimonial-band__sep" aria-hidden="true"></span>
          <span>Role &middot; Company</span>
        </div>
      </div>
    </div>
  </section>
